<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="vesta-logo-animated-title vesta-logo-animated-desc">
  <title id="vesta-logo-animated-title">Animated Vesta logo</title>
  <desc id="vesta-logo-animated-desc">An ember-shaped mark whose closed mouth opens into a rounded hearth.</desc>
  <style>
    #vesta-mouth-static {
      display: none;
    }

    #vesta-mouth {
      animation: vesta-mouth-settle 860ms 220ms cubic-bezier(0.23, 1, 0.32, 1) forwards;
      transform-box: fill-box;
      transform-origin: center;
      will-change: transform;
    }

    #vesta-mouth-line {
      animation: vesta-mouth-grow 860ms 220ms cubic-bezier(0.77, 0, 0.175, 1) forwards;
      stroke-dasharray: 0.001 1;
      stroke-dashoffset: -0.4995;
    }

    #vesta-spark {
      animation: vesta-spark-activate 360ms 1260ms cubic-bezier(0.23, 1, 0.32, 1) forwards;
      transform-box: fill-box;
      transform-origin: center;
      will-change: transform;
    }

    @keyframes vesta-mouth-grow {
      0% {
        stroke-dasharray: 0.001 1;
        stroke-dashoffset: -0.4995;
      }

      58% {
        stroke-dasharray: 0.82 0.18;
        stroke-dashoffset: -0.09;
      }

      78%,
      100% {
        stroke-dasharray: 1 0;
        stroke-dashoffset: 0;
      }
    }

    @keyframes vesta-mouth-settle {
      0%,
      58% {
        transform: scaleX(1) translateY(0);
      }

      78% {
        transform: scaleX(1.028) translateY(0.4px);
      }

      90% {
        transform: scaleX(0.994) translateY(-0.1px);
      }

      100% {
        transform: scaleX(1) translateY(0);
      }
    }

    @keyframes vesta-spark-activate {
      0% {
        transform: rotate(0deg) scale(0.96);
      }

      58% {
        transform: rotate(2.5deg) scale(1.04);
      }

      100% {
        transform: rotate(0deg) scale(1);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      #vesta-spark {
        animation: none;
        transform: none;
      }

      #vesta-mouth {
        display: none;
      }

      #vesta-mouth-static {
        display: block;
      }
    }
  </style>
