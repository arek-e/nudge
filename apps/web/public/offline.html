<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#111111" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Lares" />
    <title>Lares Offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #0d1117;
        color: #f4efe8;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: max(1rem, env(safe-area-inset-top)) 1rem max(1rem, env(safe-area-inset-bottom));
        background:
          radial-gradient(circle at top left, rgba(196, 167, 111, 0.24), transparent 30rem), #0d1117;
      }
      main {
        width: min(100%, 28rem);
        border: 1px solid rgba(244, 239, 232, 0.14);
        border-radius: 1.5rem;
        padding: 1.25rem;
        background: rgba(13, 17, 23, 0.72);
      }
      p:first-child {
        margin: 0 0 0.5rem;
        color: #c4a76f;
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }
      h1 {
        margin: 0;
        font-size: 2rem;
        letter-spacing: -0.04em;
      }
      p:last-child {
        color: #c9d1d9;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <p>Lares</p>
      <h1>You are offline</h1>
      <p>Reconnect to sync your daily operating loop and talk to Lares.</p>
    </main>
  </body>
</html>
